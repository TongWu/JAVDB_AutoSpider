name: Publish OpenAPI schema

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/cli/**'
      - 'javdb/**'
      - 'scripts/dump_openapi.py'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  dump-and-publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TZ: Asia/Singapore
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate openapi.json
        env:
          STORAGE_BACKEND: sqlite
          API_SECRET_KEY: dump-only-secret
        run: python -m apps.cli.ops.dump_openapi

      - name: Commit and open PR if changed
        run: |
          set -e
          if git diff --quiet docs/api/openapi.json; then
            echo "No schema changes; skipping commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/openapi.json
          git commit -m "docs(api): regenerate openapi.json [skip ci]"
          LOCAL_COMMIT=$(git rev-parse HEAD)

          # main is protected and requires a PR — route through the shared
          # fallback helper which forks an auto branch and opens a PR.
          bash .github/scripts/fallback_push.sh "publish-openapi" "main" "$LOCAL_COMMIT"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: docs/api/openapi.json
          retention-days: 30
