name: Publish OpenAPI schema

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/cli/**'
      - 'javdb/**'
      - 'scripts/dump_openapi.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dump-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate openapi.json
        env:
          STORAGE_BACKEND: sqlite
          API_SECRET_KEY: dump-only-secret
        run: python -m apps.cli.ops.dump_openapi

      - name: Commit if changed
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        run: |
          set -e
          if git diff --quiet docs/api/openapi.json; then
            echo "No schema changes; skipping commit"
            exit 0
          fi
          if [ -z "$GIT_USERNAME" ] || [ -z "$GIT_PASSWORD" ]; then
            echo "::error::GIT_USERNAME and GIT_PASSWORD secrets are required (PAT with bypass on main)."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/openapi.json
          git commit -m "docs(api): regenerate openapi.json [skip ci]"

          # PAT with bypass on the main branch ruleset — same secret pair used by
          # publish-to-public.yml for direct pushes to origin/main.
          ENCODED_PASSWORD=$(python3 -c "from urllib.parse import quote; print(quote('$GIT_PASSWORD', safe=''))")
          git remote set-url origin "https://${GIT_USERNAME}:${ENCODED_PASSWORD}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: docs/api/openapi.json
          retention-days: 30
