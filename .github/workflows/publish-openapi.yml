name: Publish OpenAPI schema

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/cli/**'
      - 'packages/python/**'
      - 'scripts/dump_openapi.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dump-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate openapi.json
        env:
          STORAGE_BACKEND: sqlite
          API_SECRET_KEY: dump-only-secret
        run: python scripts/dump_openapi.py

      - name: Commit if changed
        run: |
          if git diff --quiet docs/api/openapi.json; then
            echo "No schema changes; skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/openapi.json
          git commit -m "docs(api): regenerate openapi.json [skip ci]"
          git push

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: docs/api/openapi.json
          retention-days: 30
