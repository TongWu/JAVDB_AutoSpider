name: Database Migration

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      # ---- Core Options ----
      dry_run:
        description: 'Dry run — preview only, no database writes'
        required: false
        default: false
        type: boolean
      backup:
        description: 'Backup DB files before migration'
        required: false
        default: false
        type: boolean
      verify:
        description: 'Verify schema version and MovieHistory actor columns after migration'
        required: false
        default: false
        type: boolean
      skip_schema:
        description: 'Skip schema init (use with --backfill-actors or --normalize-datetimes only)'
        required: false
        default: false
        type: boolean
      # ---- Operations ----
      normalize_datetimes:
        description: 'Normalize DateTime TEXT columns (history / reports / operations)'
        required: false
        default: false
        type: boolean
      backfill_actors:
        description: 'Fill empty ActorName (and related columns) from live detail pages'
        required: false
        default: false
        type: boolean
      align_inventory_history:
        description: 'Align inventory-only codes into MovieHistory with JavDB search/detail enrichment'
        required: false
        default: false
        type: boolean
      # ---- Backfill Options ----
      backfill_limit:
        description: 'Backfill: max rows to process (0 = all)'
        required: false
        default: '0'
        type: string
      no_proxy:
        description: 'Backfill: direct HTTP without proxy (debug)'
        required: false
        default: false
        type: boolean
      use_cf_bypass:
        description: 'Backfill: enable CF bypass on first fetch attempt'
        required: false
        default: false
        type: boolean
      # ---- Align Options ----
      align_limit_per_worker:
        description: 'Alignment: max missing codes per proxy worker (0 = all). Total = this × configured proxy count (×1 if alignment uses --align-no-proxy)'
        required: false
        default: '0'
        type: string
      align_codes:
        description: 'Alignment: comma-separated video codes override'
        required: false
        default: ''
        type: string
      align_no_proxy:
        description: 'Alignment: direct HTTP without proxy (debug; proxy enabled by default)'
        required: false
        default: false
        type: boolean
      align_no_login:
        description: 'Alignment: skip movies requiring JavDB login instead of attempting authentication'
        required: false
        default: false
        type: boolean
      align_shuffle:
        description: 'Alignment: randomise processing queue to avoid consecutive failures on similar prefixes'
        required: false
        default: true
        type: boolean
      align_enqueue_qb:
        description: 'Alignment: enqueue upgrade magnets to qBittorrent'
        required: false
        default: false
        type: boolean
      align_execute_delete:
        description: 'Alignment: run rclone purge on purge-plan CSV (destructive)'
        required: false
        default: false
        type: boolean
      align_qb_category:
        description: 'Alignment: qBittorrent category override for upgrade enqueue'
        required: false
        default: ''
        type: string
      # ---- Runner ----
      runner:
        description: 'Runner type'
        required: false
        default: 'self-hosted'
        type: choice
        options:
          - 'ubuntu-latest'
          - 'self-hosted'

jobs:
  run-migration:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    # GitHub-hosted runners are capped at 6h regardless; self-hosted allows up to ~5 days.
    timeout-minutes: 1440
    environment: Production
    env:
      TZ: Asia/Singapore
      GH_TOKEN: ${{ github.token }}
      INPUT_DRY_RUN: ${{ inputs.dry_run }}
      INPUT_BACKUP: ${{ inputs.backup }}
      INPUT_VERIFY: ${{ inputs.verify }}
      INPUT_SKIP_SCHEMA: ${{ inputs.skip_schema }}
      INPUT_NORMALIZE_DATETIMES: ${{ inputs.normalize_datetimes }}
      INPUT_BACKFILL_ACTORS: ${{ inputs.backfill_actors }}
      INPUT_BACKFILL_LIMIT: ${{ inputs.backfill_limit || '0' }}
      INPUT_NO_PROXY: ${{ inputs.no_proxy }}
      INPUT_USE_CF_BYPASS: ${{ inputs.use_cf_bypass }}
      INPUT_ALIGN_INVENTORY_HISTORY: ${{ inputs.align_inventory_history }}
      INPUT_ALIGN_LIMIT_PER_WORKER: ${{ inputs.align_limit_per_worker || '0' }}
      INPUT_ALIGN_CODES: ${{ inputs.align_codes }}
      INPUT_ALIGN_NO_PROXY: ${{ inputs.align_no_proxy }}
      INPUT_ALIGN_NO_LOGIN: ${{ inputs.align_no_login }}
      INPUT_ALIGN_SHUFFLE: ${{ inputs.align_shuffle }}
      INPUT_ALIGN_ENQUEUE_QB: ${{ inputs.align_enqueue_qb }}
      INPUT_ALIGN_EXECUTE_DELETE: ${{ inputs.align_execute_delete }}
      INPUT_ALIGN_QB_CATEGORY: ${{ inputs.align_qb_category }}
      INPUT_RUNNER: ${{ inputs.runner || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          lfs: true

      - name: Set up Python, venv, dependencies, Rust extension
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'

      - name: Generate config.py from GitHub Variables and Secrets
        env:
          # ============ SECRETS (sensitive: passwords, tokens, IPs) ============
          # Migration workflow: prefer QB_URL_ADHOC; fall back to QB_URL.
          VAR_QB_URL: ${{ secrets.QB_URL_ADHOC || secrets.QB_URL }}
          VAR_QB_PASSWORD: ${{ secrets.QB_PASSWORD_ADHOC || secrets.QB_PASSWORD }}
          VAR_SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          VAR_PROXY_POOL_JSON: ${{ secrets.PROXY_POOL_JSON }}
          VAR_JAVDB_PASSWORD: ${{ secrets.JAVDB_PASSWORD }}
          VAR_JAVDB_SESSION_COOKIE: ${{ secrets.JAVDB_SESSION_COOKIE }}
          VAR_PIKPAK_PASSWORD: ${{ secrets.PIKPAK_PASSWORD }}
          # ============ VARIABLES (non-sensitive) ============
          VAR_GIT_REPO_URL: ${{ vars.GIT_REPO_URL }}
          VAR_GIT_BRANCH: ${{ vars.GIT_BRANCH }}
          VAR_QB_USERNAME: ${{ secrets.QB_USERNAME_ADHOC || secrets.QB_USERNAME }}
          VAR_TORRENT_CATEGORY: ${{ vars.TORRENT_CATEGORY }}
          VAR_TORRENT_CATEGORY_ADHOC: ${{ vars.TORRENT_CATEGORY_ADHOC }}
          VAR_TORRENT_SAVE_PATH: ${{ vars.TORRENT_SAVE_PATH }}
          VAR_AUTO_START: ${{ vars.AUTO_START }}
          VAR_SKIP_CHECKING: ${{ vars.SKIP_CHECKING || 'False' }}
          VAR_REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '30' }}
          VAR_DELAY_BETWEEN_ADDITIONS: ${{ vars.DELAY_BETWEEN_ADDITIONS }}
          VAR_SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          VAR_SMTP_PORT: ${{ vars.SMTP_PORT }}
          VAR_SMTP_USER: ${{ secrets.SMTP_USER }}
          VAR_EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          VAR_EMAIL_TO: ${{ secrets.EMAIL_TO }}
          VAR_PROXY_MODE: ${{ vars.PROXY_MODE }}
          VAR_PROXY_POOL_MAX_FAILURES: ${{ vars.PROXY_POOL_MAX_FAILURES || 3 }}
          VAR_PROXY_MODULES_JSON: ${{ vars.PROXY_MODULES_JSON }}
          VAR_LOGIN_PROXY_NAME: ${{ vars.LOGIN_PROXY_NAME || '' }}
          VAR_CF_BYPASS_SERVICE_PORT: ${{ vars.CF_BYPASS_SERVICE_PORT }}
          VAR_CF_BYPASS_ENABLED: ${{ vars.CF_BYPASS_ENABLED || 'True' }}
          VAR_PAGE_START: ${{ vars.PAGE_START }}
          VAR_PAGE_END: ${{ vars.PAGE_END }}
          VAR_PHASE2_MIN_RATE: ${{ vars.PHASE2_MIN_RATE }}
          VAR_PHASE2_MIN_COMMENTS: ${{ vars.PHASE2_MIN_COMMENTS }}
          VAR_BASE_URL: ${{ vars.BASE_URL || 'https://javdb.com' }}
          VAR_JAVDB_USERNAME: ${{ secrets.JAVDB_USERNAME }}
          VAR_GPT_API_URL: ${{ secrets.GPT_API_URL }}
          VAR_GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          VAR_MOVIE_SLEEP: ${{ vars.MOVIE_SLEEP }}
          VAR_LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          VAR_SPIDER_LOG_FILE: ${{ vars.SPIDER_LOG_FILE || 'logs/spider.log' }}
          VAR_UPLOADER_LOG_FILE: ${{ vars.UPLOADER_LOG_FILE || 'logs/qb_uploader.log' }}
          VAR_PIPELINE_LOG_FILE: ${{ vars.PIPELINE_LOG_FILE || 'logs/pipeline.log' }}
          VAR_EMAIL_NOTIFICATION_LOG_FILE: ${{ vars.EMAIL_NOTIFICATION_LOG_FILE || 'logs/email_notification.log' }}
          VAR_IGNORE_RELEASE_DATE_FILTER: ${{ vars.IGNORE_RELEASE_DATE_FILTER || 'False' }}
          VAR_INCLUDE_DOWNLOADED_IN_REPORT: ${{ vars.INCLUDE_DOWNLOADED_IN_REPORT || 'False' }}
          VAR_REPORTS_DIR: ${{ vars.REPORTS_DIR || 'reports' }}
          VAR_DAILY_REPORT_DIR: ${{ vars.DAILY_REPORT_DIR || 'reports/DailyReport' }}
          VAR_AD_HOC_DIR: ${{ vars.AD_HOC_DIR || 'reports/AdHoc' }}
          VAR_PARSED_MOVIES_CSV: ${{ vars.PARSED_MOVIES_CSV }}
          VAR_PIKPAK_EMAIL: ${{ secrets.PIKPAK_EMAIL }}
          VAR_PIKPAK_LOG_FILE: ${{ vars.PIKPAK_LOG_FILE || 'logs/pikpak_bridge.log' }}
          VAR_PIKPAK_REQUEST_DELAY: ${{ vars.PIKPAK_REQUEST_DELAY }}
          # Rclone / Dedup Configuration
          VAR_RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
          VAR_RCLONE_FOLDER_PATH: ${{ vars.RCLONE_FOLDER_PATH }}
          VAR_STORAGE_MODE: ${{ vars.STORAGE_MODE }}
        run: python3 -m apps.cli.config_generator --github-actions

      - name: Pull latest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"

          REPO_URL=$(git remote get-url origin)
          if [[ "$REPO_URL" == https://* ]]; then
            REPO_SSH=$(echo "$REPO_URL" | sed 's|https://github.com/|git@github.com:|')
            git remote set-url origin "$REPO_SSH"
          fi

          git fetch origin "$CURRENT_BRANCH"
          git pull --rebase origin "$CURRENT_BRANCH" || git pull --no-edit origin "$CURRENT_BRANCH" || true

      - name: Install rclone
        if: ${{ inputs.align_execute_delete == true }}
        run: |
          bash .github/scripts/install_rclone.sh
          rclone version

      - name: Configure rclone
        if: ${{ inputs.align_execute_delete == true }}
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          if [ -z "$RCLONE_CONFIG_BASE64" ]; then
            echo "::error::RCLONE_CONFIG_BASE64 secret is not set"
            exit 1
          fi
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_BASE64" | base64 -d > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf
          echo "rclone configured from Base64"

      - name: Display parameters
        run: |
          echo "============================================"
          echo "Migration Parameters:"
          echo "============================================"
          printf 'Dry Run:                %s\n' "$INPUT_DRY_RUN"
          printf 'Backup:                 %s\n' "$INPUT_BACKUP"
          printf 'Verify:                 %s\n' "$INPUT_VERIFY"
          printf 'Skip Schema:            %s\n' "$INPUT_SKIP_SCHEMA"
          printf 'Normalize Datetimes:    %s\n' "$INPUT_NORMALIZE_DATETIMES"
          printf 'Backfill Actors:        %s\n' "$INPUT_BACKFILL_ACTORS"
          printf '  Limit:                %s\n' "${INPUT_BACKFILL_LIMIT:-0 (all)}"
          printf '  No Proxy:             %s\n' "$INPUT_NO_PROXY"
          printf '  CF Bypass:            %s\n' "$INPUT_USE_CF_BYPASS"
          printf 'Align Inventory:        %s\n' "$INPUT_ALIGN_INVENTORY_HISTORY"
          printf '  Limit per worker:     %s\n' "${INPUT_ALIGN_LIMIT_PER_WORKER:-0 (all)}"
          if [ -n "$INPUT_ALIGN_CODES" ]; then
            printf '  Codes:                %s\n' "$INPUT_ALIGN_CODES"
          else
            echo "  Codes:                (none)"
          fi
          printf '  No Proxy:             %s\n' "$INPUT_ALIGN_NO_PROXY"
          printf '  No Login:             %s\n' "$INPUT_ALIGN_NO_LOGIN"
          printf '  Shuffle:              %s\n' "$INPUT_ALIGN_SHUFFLE"
          printf '  Enqueue QB:           %s\n' "$INPUT_ALIGN_ENQUEUE_QB"
          printf '  Execute Delete:       %s\n' "$INPUT_ALIGN_EXECUTE_DELETE"
          if [ -n "$INPUT_ALIGN_QB_CATEGORY" ]; then
            printf '  QB Category:          %s\n' "$INPUT_ALIGN_QB_CATEGORY"
          else
            echo "  QB Category:          (default)"
          fi
          printf 'Runner:                 %s\n' "$INPUT_RUNNER"
          echo "============================================"

      - name: Run migration
        run: |
          set -e
          set -o pipefail

          CMD=(python3 -m apps.cli.migration)

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            CMD+=(--dry-run)
          fi

          if [ "$INPUT_BACKUP" = "true" ]; then
            CMD+=(--backup)
          fi

          if [ "$INPUT_VERIFY" = "true" ]; then
            CMD+=(--verify)
          fi

          if [ "$INPUT_SKIP_SCHEMA" = "true" ]; then
            CMD+=(--skip-schema)
          fi

          if [ "$INPUT_NORMALIZE_DATETIMES" = "true" ]; then
            CMD+=(--normalize-datetimes)
          fi

          if [ "$INPUT_BACKFILL_ACTORS" = "true" ]; then
            CMD+=(--backfill-actors)

            LIMIT="$INPUT_BACKFILL_LIMIT"
            if [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ]; then
              CMD+=(--limit "$LIMIT")
            fi

            if [ "$INPUT_NO_PROXY" = "true" ]; then
              CMD+=(--no-proxy)
            fi

            if [ "$INPUT_USE_CF_BYPASS" = "true" ]; then
              CMD+=(--use-cf-bypass)
            fi
          fi

          if [ "$INPUT_ALIGN_INVENTORY_HISTORY" = "true" ]; then
            CMD+=(--align-inventory-history)

            ALIGN_LIMIT_PW="$INPUT_ALIGN_LIMIT_PER_WORKER"
            if [ -n "$ALIGN_LIMIT_PW" ] && [ "$ALIGN_LIMIT_PW" != "0" ]; then
              CMD+=(--align-limit-per-worker "$ALIGN_LIMIT_PW")
            fi

            ALIGN_CODES="$INPUT_ALIGN_CODES"
            if [ -n "$ALIGN_CODES" ]; then
              CMD+=(--align-codes "$ALIGN_CODES")
            fi

            if [ "$INPUT_ALIGN_NO_PROXY" = "true" ]; then
              CMD+=(--align-no-proxy)
            fi

            if [ "$INPUT_ALIGN_NO_LOGIN" = "true" ]; then
              CMD+=(--align-no-login)
            fi

            if [ "$INPUT_ALIGN_SHUFFLE" = "true" ]; then
              CMD+=(--align-shuffle)
            fi

            if [ "$INPUT_ALIGN_ENQUEUE_QB" = "true" ]; then
              CMD+=(--align-enqueue-qb)
            fi

            if [ "$INPUT_ALIGN_EXECUTE_DELETE" = "true" ]; then
              CMD+=(--align-execute-delete)
            fi

            QB_CATEGORY="$INPUT_ALIGN_QB_CATEGORY"
            if [ -n "$QB_CATEGORY" ]; then
              CMD+=(--align-qb-category "$QB_CATEGORY")
            fi
          fi

          echo "Executing: ${CMD[*]}"
          "${CMD[@]}"

      - name: Commit and push results
        if: ${{ inputs.dry_run != true }}
        env:
          REPORTS_DIR: ${{ vars.REPORTS_DIR || 'reports' }}
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"

          REPO_URL=$(git remote get-url origin)
          if [[ "$REPO_URL" == https://* ]]; then
            REPO_SSH=$(echo "$REPO_URL" | sed 's|https://github.com/|git@github.com:|')
            git remote set-url origin "$REPO_SSH"
          fi

          git add "$REPORTS_DIR/history.db" 2>/dev/null || true
          git add "$REPORTS_DIR/reports.db" 2>/dev/null || true
          git add "$REPORTS_DIR/operations.db" 2>/dev/null || true
          find "$REPORTS_DIR/Migration" -type f -exec git add {} \; 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          echo "Files to be committed:"
          git diff --cached --name-only

          LABEL="schema migration"
          if [ "$INPUT_BACKFILL_ACTORS" = "true" ]; then
            LABEL="$LABEL + backfill-actors"
          fi
          if [ "$INPUT_NORMALIZE_DATETIMES" = "true" ]; then
            LABEL="$LABEL + normalize-datetimes"
          fi
          if [ "$INPUT_ALIGN_INVENTORY_HISTORY" = "true" ]; then
            LABEL="$LABEL + align-inventory"
          fi

          git commit -m "Auto-commit: migration (${LABEL}) $(date +'%Y-%m-%d %H:%M:%S SGT')"
          LOCAL_COMMIT=$(git rev-parse HEAD)

          MAX_RETRIES=3
          RETRY_DELAY=3
          for i in $(seq 1 $MAX_RETRIES); do
            git fetch origin "$CURRENT_BRANCH"
            git pull --rebase origin "$CURRENT_BRANCH" || true
            if git push origin "$CURRENT_BRANCH"; then
              echo "Results committed and pushed"
              exit 0
            fi
            sleep $RETRY_DELAY
            RETRY_DELAY=$((RETRY_DELAY * 2))
          done

          echo ""
          echo "::warning::Failed to push after $MAX_RETRIES attempts. Initiating fallback branch strategy..."

          git checkout "$CURRENT_BRANCH" 2>/dev/null || true
          git reset --hard "$LOCAL_COMMIT" 2>/dev/null || true

          bash .github/scripts/fallback_push.sh "db-migration" "$CURRENT_BRANCH"

      - name: Summary
        if: always()
        run: |
          summary_bool() {
            if [ "$1" = "true" ]; then
              printf 'Yes'
            else
              printf 'No'
            fi
          }
          echo "## Database Migration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Dry Run**: %s\n' "$(summary_bool "$INPUT_DRY_RUN")" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Backup**: %s\n' "$(summary_bool "$INPUT_BACKUP")" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Verify**: %s\n' "$(summary_bool "$INPUT_VERIFY")" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Skip Schema**: %s\n' "$(summary_bool "$INPUT_SKIP_SCHEMA")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Operations" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Normalize Datetimes**: %s\n' "$(summary_bool "$INPUT_NORMALIZE_DATETIMES")" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Backfill Actors**: %s\n' "$(summary_bool "$INPUT_BACKFILL_ACTORS")" >> $GITHUB_STEP_SUMMARY
          if [ "$INPUT_BACKFILL_ACTORS" = "true" ]; then
            printf '  - Limit: %s\n' "${INPUT_BACKFILL_LIMIT:-0 (all)}" >> $GITHUB_STEP_SUMMARY
            printf '  - No Proxy: %s\n' "$(summary_bool "$INPUT_NO_PROXY")" >> $GITHUB_STEP_SUMMARY
            printf '  - CF Bypass: %s\n' "$(summary_bool "$INPUT_USE_CF_BYPASS")" >> $GITHUB_STEP_SUMMARY
          fi
          printf -- '- **Align Inventory**: %s\n' "$(summary_bool "$INPUT_ALIGN_INVENTORY_HISTORY")" >> $GITHUB_STEP_SUMMARY
          if [ "$INPUT_ALIGN_INVENTORY_HISTORY" = "true" ]; then
            printf '  - Limit per worker: %s\n' "${INPUT_ALIGN_LIMIT_PER_WORKER:-0 (all)}" >> $GITHUB_STEP_SUMMARY
            if [ -n "$INPUT_ALIGN_CODES" ]; then
              printf '  - Codes: %s\n' "$INPUT_ALIGN_CODES" >> $GITHUB_STEP_SUMMARY
            else
              echo "  - Codes: (none)" >> $GITHUB_STEP_SUMMARY
            fi
            printf '  - No Proxy: %s\n' "$(summary_bool "$INPUT_ALIGN_NO_PROXY")" >> $GITHUB_STEP_SUMMARY
            printf '  - No Login: %s\n' "$(summary_bool "$INPUT_ALIGN_NO_LOGIN")" >> $GITHUB_STEP_SUMMARY
            printf '  - Shuffle: %s\n' "$(summary_bool "$INPUT_ALIGN_SHUFFLE")" >> $GITHUB_STEP_SUMMARY
            printf '  - Enqueue QB: %s\n' "$(summary_bool "$INPUT_ALIGN_ENQUEUE_QB")" >> $GITHUB_STEP_SUMMARY
            printf '  - Execute Delete: %s\n' "$(summary_bool "$INPUT_ALIGN_EXECUTE_DELETE")" >> $GITHUB_STEP_SUMMARY
            if [ -n "$INPUT_ALIGN_QB_CATEGORY" ]; then
              printf '  - QB Category: %s\n' "$INPUT_ALIGN_QB_CATEGORY" >> $GITHUB_STEP_SUMMARY
            else
              echo "  - QB Category: (default)" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Runner**: %s\n' "$INPUT_RUNNER" >> $GITHUB_STEP_SUMMARY
