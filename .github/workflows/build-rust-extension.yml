name: Build Rust Extension

# This workflow builds the Rust extension wheel and caches it.
# It can be triggered standalone on push, manually, or called by other workflows.
#
# Two parallel jobs:
#   - build-x64: always runs on ubuntu-latest (GitHub-hosted, x64)
#   - build-arm: runs on self-hosted (ARM). Skipped gracefully if no
#     self-hosted runner picks up the job within 5 minutes.

on:
  push:
    branches:
      - main
      - dev
      - feature/**
    paths:
      - 'packages/rust/javdb_rust_core/**'
      - '.github/workflows/build-rust-extension.yml'
      - '.github/actions/install-rust-wheel/**'
      - '.github/actions/setup-python-env/**'
      - '.github/actions/restore-encrypted-config/**'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # =============================================================================
  # x64 build (GitHub-hosted)
  # =============================================================================
  build-x64:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Singapore

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Build and cache Rust wheel
        uses: ./.github/actions/install-rust-wheel

      - name: Sanitize branch name
        id: branch
        run: echo "name=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

      - name: Upload Rust extension wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-extension-wheel-x64-${{ github.sha }}
          path: /tmp/rust-wheel/*.whl
          retention-days: 30

      - name: Upload Rust extension wheel artifact (branch latest)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-extension-wheel-x64-latest-${{ steps.branch.outputs.name }}
          path: /tmp/rust-wheel/*.whl
          retention-days: 7

      # Drift detection: assert the freshly-built Rust parsers produce
      # the same output as the FROZEN Python fallbacks under
      # apps/api/parsers/ on real HTML fixtures. Known drifts are tracked
      # via xfail markers in tests/parity/test_parser_parity.py — flip them
      # to expected-pass when the underlying Rust gap is closed.
      - name: Install Python deps for parity tests
        run: pip install -r requirements.txt
      - name: Run Rust/Python parser parity tests
        run: pytest tests/parity/ -v

  # =============================================================================
  # ARM build (self-hosted)
  # Timeout after 5 min if no runner picks it up; failure does not block x64.
  # The `# PUBLIC_RUNNER:` marker is rewritten by publish-to-public.yml so the
  # public repo (which has no self-hosted runner) falls back to GitHub-hosted
  # ARM. Format: `runs-on: <private-runner>  # PUBLIC_RUNNER: <public-runner>`.
  # =============================================================================
  build-arm:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    continue-on-error: true
    env:
      TZ: Asia/Singapore

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Ensure Python 3 is available
        shell: bash
        run: |
          if ! command -v python3 &>/dev/null; then
            echo "::error::python3 not found on self-hosted runner"
            exit 1
          fi
          python3 --version

      - name: Build and cache Rust wheel
        uses: ./.github/actions/install-rust-wheel

      - name: Sanitize branch name
        id: branch
        run: echo "name=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

      - name: Upload Rust extension wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-extension-wheel-arm-${{ github.sha }}
          path: /tmp/rust-wheel/*.whl
          retention-days: 30

      - name: Upload Rust extension wheel artifact (branch latest)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-extension-wheel-arm-latest-${{ steps.branch.outputs.name }}
          path: /tmp/rust-wheel/*.whl
          retention-days: 7
