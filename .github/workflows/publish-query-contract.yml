name: Publish query Contract Golden

# ADR-018 D6: regenerate the dual-backend query Contract Golden whenever a pinned
# builder (or the case set) changes on main, commit the refreshed golden, and
# dispatch a re-vendor event to the TS web repo. Mirrors publish-openapi.yml.

on:
  push:
    branches: [main]
    paths:
      - 'javdb/storage/repos/**'
      - 'apps/cli/ops/query_contract_cases.py'
      - 'apps/cli/ops/dump_query_contract.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Regenerate golden
        run: python -m apps.cli.ops.dump_query_contract

      - name: Commit if changed
        id: commit
        run: |
          set -e
          if git diff --quiet docs/api/contract/query-builders.golden.json; then
            echo "No golden changes; skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/contract/query-builders.golden.json
          git commit -m "docs(api): regenerate query Contract Golden [skip ci]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch re-vendor to web repo
        # Notifies TongWu/JAVDB_AutoSpider_Web to re-vendor the golden and open a
        # reconcile PR. WEB_REPO_DISPATCH_TOKEN is a PAT with contents:write on
        # the web repo (configured in this repo's Production environment).
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.WEB_REPO_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/TongWu/JAVDB_AutoSpider_Web/dispatches \
            -d '{"event_type":"query-golden-updated"}'
