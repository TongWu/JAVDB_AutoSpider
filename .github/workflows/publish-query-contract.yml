name: Publish query Contract Golden

# ADR-018 D6: regenerate the dual-backend query Contract Golden whenever a pinned
# builder (or the case set) changes on main, commit the refreshed golden, and
# dispatch a re-vendor event to the TS web repo. Mirrors publish-openapi.yml.

on:
  push:
    branches: [main]
    paths:
      - 'javdb/storage/repos/**'
      - 'apps/cli/ops/query_contract_cases.py'
      - 'apps/cli/ops/dump_query_contract.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          # Full history so the "did this push change the golden?" diff below
          # can resolve github.event.before.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Regenerate golden
        run: python -m apps.cli.ops.dump_query_contract

      - name: Self-commit golden if a builder PR forgot to regenerate it
        id: commit
        # Normal flow: the golden diff arrives already-committed inside the
        # builder PR (a visible diff in review), so this regen is a no-op. This
        # is only a safety net — if regeneration was forgotten, commit it here so
        # main never carries a golden that disagrees with its builders.
        run: |
          set -e
          if git diff --quiet docs/api/contract/query-builders.golden.json; then
            echo "self_committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/contract/query-builders.golden.json
          git commit -m "docs(api): regenerate query Contract Golden [skip ci]"
          git push
          echo "self_committed=true" >> "$GITHUB_OUTPUT"

      - name: Did this push change the golden?
        id: pushdiff
        # The dispatch must fire whenever the golden changes on main — INCLUDING
        # the normal flow where the golden was already committed in the builder
        # PR (so the regen step above is a no-op). Gating dispatch only on a
        # self-commit would miss that case and leave the TS vendor permanently
        # stale (ADR-018 D6 review). For manual runs we always notify.
        run: |
          set -e
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "golden_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "golden_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$before" "${{ github.sha }}" \
               | grep -qx 'docs/api/contract/query-builders.golden.json'; then
            echo "golden_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "golden_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch re-vendor to web repo
        # Notifies TongWu/JAVDB_AutoSpider_Web to re-vendor the golden and open a
        # reconcile PR. WEB_REPO_DISPATCH_TOKEN is a PAT with contents:write on
        # the web repo (configured in this repo's Production environment).
        if: steps.commit.outputs.self_committed == 'true' || steps.pushdiff.outputs.golden_changed == 'true'
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.WEB_REPO_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/TongWu/JAVDB_AutoSpider_Web/dispatches \
            -d '{"event_type":"query-golden-updated"}'
