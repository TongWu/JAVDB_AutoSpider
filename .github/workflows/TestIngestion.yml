name: JavDB Test Ingestion Pipeline (Mock)

# This is a mock workflow to smoke-test the spider portion of the ingestion
# pipeline without touching the remote repository or downstream integrations.
# It runs both Daily and AdHoc spider flows with minimal data for quick testing.
#
# SIMPLIFIED VERSION:
# - No qBittorrent upload
# - No PikPak bridge
# - No email notification
# - No git commit / push (results only exist as encrypted artifacts)
# - Minimal secrets/variables required
#
# LFS: checkout uses `ssh-key + lfs: true` (matching Daily/AdHoc/Migration etc.)
# so that `reports/{history,reports,operations}.db` are pulled as real SQLite
# files instead of LFS pointer text.  Without this, init_db()/db_create_report_session
# in run_service.py aborts the run under STORAGE_MODE in {db,duo}.
#
# Proxy behaviour matches Daily/AdHoc: Spider uses the proxy pool by default on
# push/schedule, and honours the `proxy_spider` toggle on workflow_dispatch.

permissions:
  contents: read  # Least privilege: test ingestion only reads code and uploads encrypted artifacts

on:
  # >>>> PRIVATE_ONLY_PUSH_BEGIN
  # Auto push trigger enabled in PRIVATE repo only.
  # The publish-to-public workflow comments out every active line inside this
  # block for the public repo (the BEGIN / END markers are preserved), so in
  # the public repo only workflow_dispatch remains active while this config
  # stays visible for reference.
  # push:
  #   branches:
  #     - main
  #   paths:
  #     # Python entry points & CLI modules
  #     - 'apps/**/*.py'
  #     - 'pipeline.py'
  #     - 'compat.py'
  #     # Python libraries used by daily & adhoc ingestion
  #     - 'packages/python/**/*.py'
  #     - 'utils/**/*.py'
  #     - 'scripts/**/*.py'
  #     # Python dependency manifest
  #     - 'requirements.txt'
  #     # Rust extension (affects spider / dedup / rclone / history ops)
  #     - 'packages/rust/javdb_rust_core/**/*.rs'
  #     - 'packages/rust/javdb_rust_core/Cargo.toml'
  #     - 'packages/rust/javdb_rust_core/Cargo.lock'
  #     - 'packages/rust/javdb_rust_core/pyproject.toml'
  #     # The workflow itself
  #     - '.github/workflows/TestIngestion.yml'
  #     - '.github/actions/setup-python-env/**'
  #     - '.github/actions/restore-encrypted-config/**'
  #     - '.github/actions/install-rust-wheel/**'
  # <<<< PRIVATE_ONLY_PUSH_END

  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner type for pipeline jobs'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - 'ubuntu-latest'
          - 'self-hosted'
      proxy_spider:
        description: 'Enable proxy for Spider requests'
        required: false
        default: true
        type: boolean

jobs:
  # =============================================================================
  # Job 1: Setup and Run Pipeline - Simplified single job
  # =============================================================================
  run-pipeline:
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-latest' }}
    environment: Production
    env:
      TZ: Asia/Singapore
      # Ingestion Perfect Rollback (Phase 2): TestIngestion is the
      # experimental canary for the pending write path.  Setting
      # JAVDB_HISTORY_WRITE_MODE=pending makes db_create_report_session
      # record WriteMode='pending' on every ReportSessions row this
      # workflow creates, which routes the cleanup-on-failure rollback
      # through the new DELETE-pending / resume-finalizing path instead
      # of the legacy X3 audit replay.  DailyIngestion / AdHocIngestion
      # remain on the default 'audit' until Phase 3.
      JAVDB_HISTORY_WRITE_MODE: pending
      # Ingestion Perfect Rollback (Phase 2): make TestIngestion's
      # storage backend explicit at the workflow level so the canary
      # always exercises the dual-write path against D1 even if the
      # repo-level ``vars.STORAGE_BACKEND`` drifts back to ``sqlite``.
      # DailyIngestion / AdHocIngestion still honour the repo var; only
      # TestIngestion is pinned, since this is the only workflow whose
      # entire write tail is rolled back at the end.
      STORAGE_BACKEND: dual
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          lfs: true

      - name: Get current branch
        run: |
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Current branch: $CURRENT_BRANCH"

      - name: Set up Python, venv, dependencies, Rust extension
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'

      - name: Generate config.py from GitHub Variables and Secrets
        env:
          # ============ REQUIRED SECRETS/VARIABLES (minimal set) ============
          # These 8 are required for testing:
          VAR_JAVDB_PASSWORD: ${{ secrets.JAVDB_PASSWORD }}
          VAR_JAVDB_USERNAME: ${{ secrets.JAVDB_USERNAME }}
          VAR_GIT_BRANCH: ${{ vars.GIT_BRANCH || 'main' }}
          VAR_GIT_REPO_URL: ${{ vars.GIT_REPO_URL || format('{0}/{1}', github.server_url, github.repository) }}
          VAR_PROXY_MODE: ${{ vars.PROXY_MODE }}
          VAR_PROXY_POOL_JSON: ${{ secrets.PROXY_POOL_JSON }}
          VAR_PROXY_MODULES_JSON: ${{ vars.PROXY_MODULES_JSON }}
          # Spider proxy: default ON for push/schedule (matches Daily/AdHoc behaviour);
          # workflow_dispatch honours the user's toggle.
          VAR_PROXY_SPIDER_ENABLED: ${{ github.event_name == 'workflow_dispatch' && (inputs.proxy_spider && 'true' || 'false') || 'true' }}
          VAR_PROXY_QBITTORRENT_ENABLED: 'false'
          VAR_PROXY_PIKPAK_ENABLED: 'false'
          VAR_LOGIN_PROXY_NAME: ${{ vars.LOGIN_PROXY_NAME || '' }}
          # ============ GPT API FOR LOGIN (required for auto-login) ============
          VAR_GPT_API_URL: ${{ secrets.GPT_API_URL }}
          VAR_GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          # ============ DEFAULT VALUES FOR OTHER CONFIGS ============
          VAR_BASE_URL: 'https://javdb.com'
          VAR_PAGE_START: '1'
          VAR_PAGE_END: '20'
          VAR_PHASE2_MIN_RATE: '4.0'
          VAR_PHASE2_MIN_COMMENTS: '85'
          VAR_MOVIE_SLEEP: '5,15'
          VAR_LOG_LEVEL: 'INFO'
          VAR_SPIDER_LOG_FILE: 'logs/spider.log'
          VAR_REPORTS_DIR: 'reports'
          VAR_DAILY_REPORT_DIR: 'reports/DailyReport'
          VAR_AD_HOC_DIR: 'reports/AdHoc'
          VAR_PARSED_MOVIES_CSV: 'parsed_movies_history.csv'
          VAR_IGNORE_RELEASE_DATE_FILTER: 'False'
          VAR_CF_BYPASS_ENABLED: 'True'
          VAR_CF_BYPASS_SERVICE_PORT: '8000'
          VAR_PROXY_POOL_MAX_FAILURES: '3'
          VAR_STORAGE_MODE: ${{ vars.STORAGE_MODE }}
          # D1 / Cloudflare (only required when STORAGE_BACKEND in {d1,dual})
          # B.13 (2026-05-12): pin to ``dual`` to match the job-level
          # ``STORAGE_BACKEND: dual`` env above. The previous
          # ``${{ vars.STORAGE_BACKEND || 'sqlite' }}`` pulled the repo
          # variable, so ``config_generator.get_env`` baked
          # ``STORAGE_BACKEND='sqlite'`` into config.py while the spider
          # process's ``os.environ['STORAGE_BACKEND']`` correctly read
          # 'dual' — a confusing split where ``from config import
          # STORAGE_BACKEND`` and ``db._backend_mode()`` could disagree.
          # Single source of truth here keeps TestIngestion's canary
          # honest.
          VAR_STORAGE_BACKEND: dual
          VAR_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VAR_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VAR_D1_HISTORY_DB_ID: ${{ secrets.D1_HISTORY_DB_ID }}
          VAR_D1_REPORTS_DB_ID: ${{ secrets.D1_REPORTS_DB_ID }}
          VAR_D1_OPERATIONS_DB_ID: ${{ secrets.D1_OPERATIONS_DB_ID }}
          # Cross-instance proxy coordinator (Cloudflare DO).  Both empty
          # means "disabled — use local throttling only".  See
          # docs/PROXY_COORDINATOR_DEPLOY.md for setup steps.
          VAR_PROXY_COORDINATOR_URL: ${{ vars.PROXY_COORDINATOR_URL }}
          VAR_PROXY_COORDINATOR_TOKEN: ${{ secrets.PROXY_COORDINATOR_TOKEN }}
          VAR_MOVIE_CLAIM_ENABLED: ${{ vars.MOVIE_CLAIM_ENABLED || 'auto' }}
          # Cross-runner registry (P2-E RunnerRegistry DO).  When 'true' the
          # spider registers/heartbeats so MovieClaim auto-mount, proxy-pool
          # drift detection and cohort summaries see this run.  Default
          # 'false' preserves single-runner behaviour.
          VAR_RUNNER_REGISTRY_ENABLED: ${{ vars.RUNNER_REGISTRY_ENABLED || 'false' }}
        run: python3 -m apps.cli.config_generator --github-actions

      - name: Display Test Parameters
        run: |
          echo "============================================"
          echo "TEST INGESTION PARAMETERS (Mock Mode)"
          echo "============================================"
          echo ""
          echo "DAILY INGESTION TEST:"
          echo "  - Pages to parse: 1-3 (first 3 pages)"
          echo "  - Max movies phase 1: 1"
          echo "  - Max movies phase 2: 1"
          echo ""
          echo "ADHOC INGESTION TEST:"
          echo "  - URL: https://javdb.com/actors/wm9B?t=d&sort_type=0"
          echo "  - Pages to parse: 1 (first page only)"
          echo "  - Max movies phase 1: 1"
          echo "  - Max movies phase 2: 1"
          echo ""
          echo "NOTE: This workflow does NOT commit or push any changes"
          echo "NOTE: qBittorrent, PikPak, and Email steps are DISABLED"
          echo "NOTE: All DB writes from this run will be ROLLED BACK at end"
          echo "============================================"

      - name: Capture workflow run start (UTC ISO)
        id: capture_run_started_at
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: "[DEBUG] Show ingestion mode env"
        run: |
          echo "============================================"
          echo "Ingestion Perfect Rollback canary parameters"
          echo "  JAVDB_HISTORY_WRITE_MODE=$JAVDB_HISTORY_WRITE_MODE"
          echo "  STORAGE_BACKEND=$STORAGE_BACKEND"
          echo "============================================"

      # ========================================
      # PART 1: Daily Ingestion Test (Spider Only)
      # ========================================
      - name: "[DAILY] Run Spider"
        id: daily_spider
        run: |
          set -e  # Exit on error
          set -o pipefail  # Exit on error in pipeline (important for tee)
          
          echo "============================================"
          echo "DAILY INGESTION - Spider"
          echo "============================================"
          
          # Run spider with limited scope for testing
          # - Parse only first 10 pages (--start-page 1 --end-page 10)
          # - Process only first 1 movie for phase 1 (--max-movies-phase1 1)
          # - Process only first 1 movie for phase 2 (--max-movies-phase2 1)
          SPIDER_OUTPUT=$(python3 -m apps.cli.spider \
            --start-page 1 \
            --end-page 10 \
            --max-movies-phase1 1 \
            --max-movies-phase2 1 | tee /dev/stderr)
          
          # Extract CSV filename from spider output
          CSV_FILENAME=$(echo "$SPIDER_OUTPUT" | grep "^SPIDER_OUTPUT_CSV=" | cut -d'=' -f2 | tail -1)
          if [ -n "$CSV_FILENAME" ]; then
            echo "csv_filename=$CSV_FILENAME" >> $GITHUB_OUTPUT
            echo "Captured Daily CSV filename: $CSV_FILENAME"
          else
            echo "Warning: Could not capture Daily CSV filename from spider output"
          fi

      # ========================================
      # PART 2: AdHoc Ingestion Test (Spider Only)
      # ========================================
      - name: "[ADHOC] Run Spider"
        id: adhoc_spider
        run: |
          set -e  # Exit on error
          set -o pipefail  # Exit on error in pipeline (important for tee)
          
          echo "============================================"
          echo "ADHOC INGESTION - Spider"
          echo "============================================"
          
          # Run spider with limited scope for testing
          # - Custom URL: actors/wm9B with sort parameters
          # - Parse only first 1 page (--start-page 1 --end-page 1)
          # - Process only first 1 movie for phase 1 (--max-movies-phase1 1)
          # - Process only first 1 movie for phase 2 (--max-movies-phase2 1)
          # - Ignore release date filter for adhoc mode
          SPIDER_OUTPUT=$(python3 -m apps.cli.spider \
            --url 'https://javdb.com/actors/wm9B?t=d&sort_type=0' \
            --start-page 1 \
            --end-page 1 \
            --max-movies-phase1 1 \
            --max-movies-phase2 1 \
            --ignore-release-date | tee /dev/stderr)
          
          # Extract CSV filename from spider output
          CSV_FILENAME=$(echo "$SPIDER_OUTPUT" | grep "^SPIDER_OUTPUT_CSV=" | cut -d'=' -f2 | tail -1)
          if [ -n "$CSV_FILENAME" ]; then
            echo "csv_filename=$CSV_FILENAME" >> $GITHUB_OUTPUT
            echo "Captured AdHoc CSV filename: $CSV_FILENAME"
          else
            echo "Warning: Could not capture AdHoc CSV filename from spider output"
          fi

      - name: "[VERIFY] Snapshot pending tables BEFORE rollback"
        if: always()
        run: |
          # Ingestion Perfect Rollback (Phase 2): proves the pending
          # write path was actually taken before the cleanup step
          # wipes the rows.  Non-zero counts here + zero counts after
          # rollback = the canary worked.  Zero here means the spider
          # silently fell back to the audit upsert and we're not
          # validating Phase 2 at all.
          set -e
          python3 - <<'PY'
          import os, sqlite3
          run_id = "${{ github.run_id }}"
          attempt = int("${{ github.run_attempt }}")
          db = "reports/history.db"
          if not os.path.exists(db):
              print(f"[skip] {db} absent — cannot snapshot pending counts")
              raise SystemExit(0)
          conn = sqlite3.connect(db)
          try:
              for tbl in ("PendingMovieHistoryWrites",
                          "PendingTorrentHistoryWrites"):
                  try:
                      n = conn.execute(
                          f"SELECT COUNT(*) FROM {tbl} "
                          f"WHERE RunId=? AND RunAttempt=?",
                          (run_id, attempt),
                      ).fetchone()[0]
                  except sqlite3.OperationalError as e:
                      print(f"[skip] {tbl} — {e}")
                      continue
                  print(f"[snap] {tbl} = {n} rows for run {run_id}/{attempt}")
          finally:
              conn.close()
          PY

      # ============================================================
      # MANDATORY CLEANUP — runs on success AND failure (always()).
      #
      # TestIngestion exercises the *full* dual-write pipeline so it
      # catches D1 / SQLite drift before it reaches DailyIngestion.
      # The only thing that distinguishes it from production is that
      # every ReportSessions / audit row produced by this run must be
      # rewound at the end — the production DB stays free of mock
      # rows.
      #
      # We rely on the X3 rollback machinery already used by
      # cleanup-on-failure in DailyIngestion / AdHocIngestion:
      #   * `apps.cli.rollback --run-id <id> --attempt <n> --scope all
      #     --apply` finds every sibling session via the (RunId,
      #     RunAttempt) union query, rewinds each one through the
      #     audit tables (handles INSERT / UPDATE / DELETE), then
      #     deletes the ReportSessions row.
      #   * Spider does NOT auto-commit — sessions stay
      #     `Status='in_progress'` until either a workflow's
      #     `commit_session` step runs (DailyIngestion / AdHoc) or
      #     this rollback step runs (TestIngestion).
      #
      # If rollback fails the workflow fails — better to surface the
      # bug than leave production polluted.
      # ============================================================
      - name: "[CLEANUP] Roll back all DB writes from this run"
        if: always()
        env:
          RUN_STARTED_AT: ${{ steps.capture_run_started_at.outputs.started_at }}
          ROLLBACK_REASON: test_ingestion_cleanup
        run: |
          set -e
          set -o pipefail
          echo "============================================"
          echo "TestIngestion cleanup — rolling back all writes"
          echo "  RUN_ID=${{ github.run_id }}"
          echo "  ATTEMPT=${{ github.run_attempt }}"
          echo "  RUN_STARTED_AT=$RUN_STARTED_AT"
          echo "============================================"
          python3 -m apps.cli.rollback \
            --run-id "${{ github.run_id }}" \
            --attempt "${{ github.run_attempt }}" \
            --run-started-at "$RUN_STARTED_AT" \
            --scope all \
            --failure-reason "$ROLLBACK_REASON" \
            --apply

      - name: "[CLEANUP] Verify no rows remain tagged to this run"
        if: always()
        run: |
          set -e
          echo "============================================"
          echo "Verifying ZERO leftover rows for run "
          echo "  ${{ github.run_id }} attempt ${{ github.run_attempt }}"
          echo "============================================"
          python3 - <<'PY'
          import os, sqlite3, sys
          run_id = "${{ github.run_id }}"
          attempt = int("${{ github.run_attempt }}")
          # Local SQLite — every dual-write went here too.  The
          # rollback CLI already runs in dual mode and has touched
          # both sides; this is the local-side proof.
          # Ingestion Perfect Rollback (Phase 2): also assert the
          # pending tables are empty for this run.  A non-zero count
          # would mean the cleanup rollback dispatcher missed the
          # `WriteMode='pending'` branch.  Audit-mode columns stay
          # checked too — TestIngestion may downgrade to audit during
          # an emergency.
          checks = [
              ('reports/reports.db', 'ReportSessions',
               "RunId=? AND RunAttempt=?"),
              ('reports/history.db', 'MovieHistoryAudit',
               "RunId=? AND RunAttempt=?"),
              ('reports/history.db', 'TorrentHistoryAudit',
               "RunId=? AND RunAttempt=?"),
              ('reports/history.db', 'PendingMovieHistoryWrites',
               "RunId=? AND RunAttempt=?"),
              ('reports/history.db', 'PendingTorrentHistoryWrites',
               "RunId=? AND RunAttempt=?"),
          ]
          violations = []
          for path, table, where in checks:
              if not os.path.exists(path):
                  print(f"[skip] {path} — file absent")
                  continue
              conn = sqlite3.connect(path)
              try:
                  try:
                      n = conn.execute(
                          f"SELECT COUNT(*) FROM {table} WHERE {where}",
                          (run_id, attempt),
                      ).fetchone()[0]
                  except sqlite3.OperationalError as e:
                      print(f"[skip] {path}::{table} — {e}")
                      continue
                  if n:
                      violations.append(
                          f"{path}::{table} has {n} row(s) for "
                          f"run {run_id}/{attempt}"
                      )
                      print(f"[FAIL] {path}::{table} = {n} rows")
                  else:
                      print(f"[ok]   {path}::{table} = 0 rows")
              finally:
                  conn.close()
          if violations:
              print("FATAL: rollback did not fully clean up:")
              for v in violations:
                  print(f"  - {v}")
              sys.exit(1)
          print("OK: local SQLite is clean for this run.")
          PY

      - name: "[CLEANUP] Verify D1 has no rows tagged to this run"
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_REPORTS_DB_ID: ${{ secrets.D1_REPORTS_DB_ID }}
          D1_HISTORY_DB_ID: ${{ secrets.D1_HISTORY_DB_ID }}
        run: |
          set -e
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$D1_REPORTS_DB_ID" ]; then
            echo "Cloudflare credentials not configured — skipping D1 verification"
            exit 0
          fi
          RUN_ID="${{ github.run_id }}"
          ATTEMPT="${{ github.run_attempt }}"
          fail=0
          check_d1() {
            local db_id="$1"; local table="$2"
            resp=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database/$db_id/query" \
              -d "{\"sql\":\"SELECT COUNT(*) AS n FROM $table WHERE RunId='$RUN_ID' AND RunAttempt=$ATTEMPT;\"}")
            n=$(echo "$resp" | python3 -c 'import json,sys; r=json.load(sys.stdin); print(r["result"][0]["results"][0]["n"])')
            if [ "$n" != "0" ]; then
              echo "[FAIL] D1::$table has $n row(s) for run $RUN_ID/$ATTEMPT"
              fail=1
            else
              echo "[ok]   D1::$table = 0 rows"
            fi
          }
          check_d1 "$D1_REPORTS_DB_ID" "ReportSessions"
          check_d1 "$D1_HISTORY_DB_ID" "MovieHistoryAudit"
          check_d1 "$D1_HISTORY_DB_ID" "TorrentHistoryAudit"
          # Ingestion Perfect Rollback (Phase 2) — pending tables.
          check_d1 "$D1_HISTORY_DB_ID" "PendingMovieHistoryWrites"
          check_d1 "$D1_HISTORY_DB_ID" "PendingTorrentHistoryWrites"
          if [ "$fail" = "1" ]; then
            echo "FATAL: D1 still has rows tagged to this run"
            exit 1
          fi
          echo "OK: D1 is clean for this run."

      - name: Display generated reports
        run: |
          echo "============================================"
          echo "GENERATED REPORTS"
          echo "============================================"
          echo ""
          echo "Daily CSV: ${{ steps.daily_spider.outputs.csv_filename }}"
          echo "AdHoc CSV: ${{ steps.adhoc_spider.outputs.csv_filename }}"
          echo ""
          echo "All CSV files in reports directory:"
          find reports -name "*.csv" -type f 2>/dev/null | head -20 || echo "No CSV files found"
          echo ""
          echo "History file status:"
          if [ -f "reports/parsed_movies_history.csv" ]; then
            echo "  parsed_movies_history.csv: EXISTS ($(wc -l < reports/parsed_movies_history.csv) lines)"
          else
            echo "  parsed_movies_history.csv: NOT FOUND"
          fi

      - name: Encrypt and upload logs artifact
        if: always()
        env:
          ARTIFACT_KEY: ${{ secrets.ARTIFACT_KEY }}
        run: |
          # Guard: fail workflow if ARTIFACT_KEY is not configured (prevent unencrypted artifacts)
          if [ -z "$ARTIFACT_KEY" ]; then
            echo "❌ ERROR: ARTIFACT_KEY secret is not configured."
            echo "This secret is required to encrypt artifacts before upload."
            echo "Please configure the ARTIFACT_KEY secret in your repository settings."
            exit 1
          fi
          
          mkdir -p encrypted_artifacts
          
          LOG_FILES=""
          if ls logs/*.log 1> /dev/null 2>&1; then
            LOG_FILES="logs/*.log"
          fi
          if ls logs/*.txt 1> /dev/null 2>&1; then
            LOG_FILES="$LOG_FILES logs/*.txt"
          fi
          
          if [ -n "$LOG_FILES" ]; then
            tar -czf - $LOG_FILES | openssl enc -aes-256-cbc -salt -pbkdf2 -iter 100000 \
              -out encrypted_artifacts/logs.tar.gz.enc \
              -pass pass:"$ARTIFACT_KEY"
            echo "✓ Logs encrypted successfully"
          else
            echo "No log files found to encrypt"
          fi

      - name: Upload encrypted logs artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pipeline-logs-encrypted
          path: encrypted_artifacts/logs.tar.gz.enc
          retention-days: 7
          if-no-files-found: ignore

      - name: Encrypt and upload reports artifact
        if: always()
        env:
          ARTIFACT_KEY: ${{ secrets.ARTIFACT_KEY }}
          REPORTS_DIR: 'reports'
        run: |
          # Guard: fail workflow if ARTIFACT_KEY is not configured (prevent unencrypted artifacts)
          if [ -z "$ARTIFACT_KEY" ]; then
            echo "❌ ERROR: ARTIFACT_KEY secret is not configured."
            echo "This secret is required to encrypt artifacts before upload."
            echo "Please configure the ARTIFACT_KEY secret in your repository settings."
            exit 1
          fi
          
          mkdir -p encrypted_artifacts
          
          FILES_TO_ARCHIVE=""
          
          # Add Daily spider output CSV if it exists
          DAILY_CSV_PATH="${{ steps.daily_spider.outputs.csv_filename }}"
          if [ -n "$DAILY_CSV_PATH" ] && [ -f "$DAILY_CSV_PATH" ]; then
            FILES_TO_ARCHIVE="$DAILY_CSV_PATH"
            echo "Including Daily CSV: $DAILY_CSV_PATH"
          fi
          
          # Add AdHoc spider output CSV if it exists
          ADHOC_CSV_PATH="${{ steps.adhoc_spider.outputs.csv_filename }}"
          if [ -n "$ADHOC_CSV_PATH" ] && [ -f "$ADHOC_CSV_PATH" ]; then
            FILES_TO_ARCHIVE="$FILES_TO_ARCHIVE $ADHOC_CSV_PATH"
            echo "Including AdHoc CSV: $ADHOC_CSV_PATH"
          fi
          
          # Add history files if they exist
          for HIST_FILE in "$REPORTS_DIR/parsed_movies_history.csv"; do
            if [ -f "$HIST_FILE" ]; then
              FILES_TO_ARCHIVE="$FILES_TO_ARCHIVE $HIST_FILE"
              echo "Including history: $HIST_FILE"
            fi
          done
          
          if [ -n "$FILES_TO_ARCHIVE" ]; then
            tar -czf - $FILES_TO_ARCHIVE | openssl enc -aes-256-cbc -salt -pbkdf2 -iter 100000 \
              -out encrypted_artifacts/reports.tar.gz.enc \
              -pass pass:"$ARTIFACT_KEY"
            echo "✓ Reports encrypted successfully"
          else
            echo "No report files found to archive"
          fi

      - name: Upload encrypted reports artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pipeline-reports-encrypted
          path: encrypted_artifacts/reports.tar.gz.enc
          retention-days: 7
          if-no-files-found: ignore
