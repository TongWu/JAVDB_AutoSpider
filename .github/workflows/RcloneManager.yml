name: RClone Manager

concurrency:
  group: rclone-manager
  cancel-in-progress: false

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      scan:
        description: 'Scan remote folder tree into DB/CSV'
        required: false
        default: false
        type: boolean
      report:
        description: 'Generate dedup report from inventory'
        required: false
        default: false
        type: boolean
      execute:
        description: 'Execute pending deletions from dedup CSV'
        required: false
        default: false
        type: boolean
      root_path:
        description: 'Rclone root path (format: remote:/path)'
        required: false
        default: 'gdrive:/剧集/不可以色色/JAV-Sync'
        type: string
      dry_run:
        description: 'Dry run mode — execute only (simulate without deleting)'
        required: false
        default: true
        type: boolean
      incremental:
        description: 'Incremental mode — report only (only process recent changes)'
        required: false
        default: false
        type: boolean
      years:
        description: 'Comma-separated list of years (empty = all)'
        required: false
        default: ''
        type: string
      workers:
        description: 'Number of parallel workers'
        required: false
        default: '4'
        type: string
      log_level:
        description: 'Logging level'
        required: false
        default: 'INFO'
        type: choice
        options:
          - 'DEBUG'
          - 'INFO'
          - 'WARNING'
          - 'ERROR'
      runner:
        description: 'Runner type for the job'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - 'ubuntu-latest'
          - 'self-hosted'

jobs:
  rclone-manager:
    runs-on: ${{ inputs.runner }}
    environment: Production
    env:
      TZ: Asia/Singapore
      INPUT_SCAN: ${{ inputs.scan }}
      INPUT_REPORT: ${{ inputs.report }}
      INPUT_EXECUTE: ${{ inputs.execute }}
      INPUT_ROOT_PATH: ${{ inputs.root_path }}
      INPUT_YEARS: ${{ inputs.years }}
      INPUT_WORKERS: ${{ inputs.workers }}
      INPUT_LOG_LEVEL: ${{ inputs.log_level }}
      INPUT_DRY_RUN: ${{ inputs.dry_run }}
      INPUT_INCREMENTAL: ${{ inputs.incremental }}

    steps:
      - name: Validate inputs
        run: |
          if [ "$INPUT_SCAN" != "true" ] && [ "$INPUT_REPORT" != "true" ] && [ "$INPUT_EXECUTE" != "true" ]; then
            echo "❌ At least one of scan, report, execute must be enabled"
            exit 1
          fi
          if [ "$INPUT_SCAN" = "true" ] && [ "$INPUT_EXECUTE" = "true" ] && [ "$INPUT_REPORT" != "true" ]; then
            echo "❌ scan + execute requires report (enable all three)"
            exit 1
          fi
          echo "✓ Input validation passed"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          lfs: true

      - name: Set up Python, venv, dependencies, Rust extension
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'

      - name: Install rclone
        if: inputs.runner != 'self-hosted'
        run: |
          bash .github/scripts/install_rclone.sh
          rclone version

      - name: Configure rclone
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          if [ -z "$RCLONE_CONFIG_BASE64" ]; then
            echo "❌ Error: RCLONE_CONFIG_BASE64 secret is not set"
            exit 1
          fi
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_BASE64" | base64 -d > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf
          echo "✓ rclone configured from Base64"
          rclone listremotes

      - name: Pull latest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"

          REPO_URL=$(git remote get-url origin)
          if [[ "$REPO_URL" == https://* ]]; then
            REPO_SSH=$(echo "$REPO_URL" | sed 's|https://github.com/|git@github.com:|')
            git remote set-url origin "$REPO_SSH"
          fi

          git fetch origin "$CURRENT_BRANCH"
          git pull --rebase origin "$CURRENT_BRANCH" || git pull --no-edit origin "$CURRENT_BRANCH" || true

      - name: Run rclone_manager.py
        env:
          INPUT_SCAN: ${{ inputs.scan }}
          INPUT_REPORT: ${{ inputs.report }}
          INPUT_EXECUTE: ${{ inputs.execute }}
          INPUT_ROOT_PATH: ${{ inputs.root_path }}
          INPUT_YEARS: ${{ inputs.years }}
          INPUT_WORKERS: ${{ inputs.workers }}
          INPUT_LOG_LEVEL: ${{ inputs.log_level }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_INCREMENTAL: ${{ inputs.incremental }}
          VAR_STORAGE_MODE: ${{ vars.STORAGE_MODE }}
        run: |
          set -e
          set -o pipefail

          CMD=(python3 -m apps.cli.rclone_manager)

          if [ "$INPUT_SCAN" = "true" ]; then
            CMD+=(--scan)
          fi
          if [ "$INPUT_REPORT" = "true" ]; then
            CMD+=(--report)
          fi
          if [ "$INPUT_EXECUTE" = "true" ]; then
            CMD+=(--execute)
          fi

          if [ -n "$INPUT_ROOT_PATH" ]; then
            CMD+=(--root-path "$INPUT_ROOT_PATH")
          fi

          if [ -n "$INPUT_YEARS" ]; then
            CMD+=(--years "$INPUT_YEARS")
            echo "📆 Year filter: $INPUT_YEARS"
          fi

          CMD+=(--workers "$INPUT_WORKERS" --log-level "$INPUT_LOG_LEVEL")

          if [ "$INPUT_EXECUTE" = "true" ] && [ "$INPUT_DRY_RUN" = "true" ]; then
            CMD+=(--dry-run)
            echo "🔍 Execute in DRY-RUN mode"
          fi

          if [ "$INPUT_REPORT" = "true" ] && [ "$INPUT_INCREMENTAL" = "true" ]; then
            CMD+=(--incremental)
            echo "📅 Incremental mode enabled"
          fi

          echo "Running: ${CMD[*]}"
          "${CMD[@]}"

      - name: Commit and push results
        if: inputs.scan == true || inputs.report == true || (inputs.execute == true && inputs.dry_run == false)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"

          REPO_URL=$(git remote get-url origin)
          if [[ "$REPO_URL" == https://* ]]; then
            REPO_SSH=$(echo "$REPO_URL" | sed 's|https://github.com/|git@github.com:|')
            git remote set-url origin "$REPO_SSH"
          fi

          git add reports/rclone_inventory.csv 2>/dev/null || true
          git add reports/operations.db 2>/dev/null || true
          git add reports/dedup_history.csv 2>/dev/null || true
          find reports/Dedup -name "*.csv" -exec git add {} \; 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          LABEL=""
          [ "$INPUT_SCAN" = "true" ] && LABEL="${LABEL}scan+"
          [ "$INPUT_REPORT" = "true" ] && LABEL="${LABEL}report+"
          [ "$INPUT_EXECUTE" = "true" ] && LABEL="${LABEL}execute+"
          LABEL="${LABEL%+}"

          git commit -m "Auto-commit: rclone ${LABEL} $(date +'%Y-%m-%d %H:%M:%S SGT')"

          MAX_RETRIES=3
          RETRY_DELAY=3
          for i in $(seq 1 $MAX_RETRIES); do
            git fetch origin "$CURRENT_BRANCH"
            git pull --rebase origin "$CURRENT_BRANCH" || true
            if git push origin "$CURRENT_BRANCH"; then
              echo "✓ Results committed and pushed"
              exit 0
            fi
            sleep $RETRY_DELAY
            RETRY_DELAY=$((RETRY_DELAY * 2))
          done
          echo "::warning::Failed to push after $MAX_RETRIES attempts."
          exit 1

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: rclone-${{ github.run_number }}
          path: |
            reports/rclone_inventory.csv
            reports/operations.db
            reports/dedup_history.csv
            reports/Dedup/
          retention-days: 30
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          summary_bool() {
            if [ "$1" = "true" ]; then
              printf 'Yes'
            else
              printf 'No'
            fi
          }
          echo "## RClone Manager Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PHASES=""
          [ "$INPUT_SCAN" = "true" ] && PHASES="${PHASES}scan "
          [ "$INPUT_REPORT" = "true" ] && PHASES="${PHASES}report "
          [ "$INPUT_EXECUTE" = "true" ] && PHASES="${PHASES}execute "
          echo "- **Phases**: ${PHASES}" >> $GITHUB_STEP_SUMMARY

          if [ "$INPUT_EXECUTE" = "true" ]; then
            printf -- '- **Dry Run**: %s\n' "$(summary_bool "$INPUT_DRY_RUN")" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$INPUT_REPORT" = "true" ]; then
            printf -- '- **Incremental**: %s\n' "$(summary_bool "$INPUT_INCREMENTAL")" >> $GITHUB_STEP_SUMMARY
          fi

          printf -- '- **Root Path**: %s\n' "$INPUT_ROOT_PATH" >> $GITHUB_STEP_SUMMARY
          if [ -n "$INPUT_YEARS" ]; then
            printf -- '- **Year Filter**: %s\n' "$INPUT_YEARS" >> $GITHUB_STEP_SUMMARY
          fi
          printf -- '- **Workers**: %s\n' "$INPUT_WORKERS" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Log Level**: %s\n' "$INPUT_LOG_LEVEL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "reports/rclone_inventory.csv" ]; then
            LINES=$(wc -l < "reports/rclone_inventory.csv")
            echo "### Inventory" >> $GITHUB_STEP_SUMMARY
            echo "Records: $((LINES - 1))" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -d "reports/Dedup" ]; then
            REPORT_FILE=$(find reports/Dedup -name "*.csv" -type f | sort -r | head -1)
            if [ -n "$REPORT_FILE" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Dedup Report" >> $GITHUB_STEP_SUMMARY
              echo "Report file: \`$REPORT_FILE\`" >> $GITHUB_STEP_SUMMARY
              LINES=$(wc -l < "$REPORT_FILE")
              echo "Records: $((LINES - 1))" >> $GITHUB_STEP_SUMMARY
            fi
          fi
