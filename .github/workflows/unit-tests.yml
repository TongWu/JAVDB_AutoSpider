# GitHub Actions workflow for running unit tests on Pull Requests
# This workflow runs automatically when:
# - A PR is opened or updated targeting main/master branch
# - Code is pushed to main/master branch

name: Unit Tests
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '**.py'
      - '**.rs'
      - 'packages/rust/javdb_rust_core/Cargo.toml'
      - 'packages/rust/javdb_rust_core/Cargo.lock'
      - 'pytest.ini'
      - 'docker/**'
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, reopened ]
    paths:
      - '**.py'
      - '**.rs'
      - 'packages/rust/javdb_rust_core/Cargo.toml'
      - 'packages/rust/javdb_rust_core/Cargo.lock'
      - 'pytest.ini'
      - 'docker/**'

jobs:
  rust-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          packages/rust/javdb_rust_core/target
        key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('packages/rust/javdb_rust_core/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-cargo-

    - name: Run cargo check
      working-directory: packages/rust/javdb_rust_core
      run: cargo check

    - name: Run cargo test
      working-directory: packages/rust/javdb_rust_core
      run: cargo test

  build-wheel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Build and cache Rust wheel
      uses: ./.github/actions/install-rust-wheel

  test:
    runs-on: ubuntu-latest
    needs: [build-wheel]
    if: always() && !cancelled()

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python, venv, dependencies, Rust extension
      uses: ./.github/actions/setup-python-env
      with:
        python-version: ${{ matrix.python-version }}
        upgrade-pip: 'true'

    - name: Create config.py from example
      run: |
        cp config.py.example config.py

    - name: Run unit tests with pytest
      run: |
        pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

    - name: Run fallback tests without Rust extension
      run: |
        pip uninstall -y javdb-rust-core || true
        pip uninstall -y javdb_rust_core || true
        pytest tests/unit/test_rust_adapters_fallback.py tests/unit/test_dedup_checker_rust_adapter.py -v --tb=short

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.python-version == '3.12'
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run flake8 linting
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=150 --statistics --exclude=__pycache__,.git,*.pyc,rust_core
