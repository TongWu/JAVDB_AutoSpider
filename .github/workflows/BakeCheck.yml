name: ADR-006 Bake Metrics Check

# Daily automated check of the ADR-006 30-day bake gate (the ADR-005
# D10 prerequisites). Pulls the most recent successful DailyIngestion's
# encrypted reports artifact, decrypts it, and runs
# `apps.cli.ops.check_bake_metrics` against the resulting SQLite + jsonl.
# A regression (any of the three checks failing) fails this workflow,
# which surfaces the standard Actions "workflow failed" email and shows
# red in the Actions UI.
#
# Schedule: 04:00 UTC = 12:00 SGT, two hours after StaleSessionCleanup
# so the DB state is settled (no in-progress session windows still
# being closed by the stale-cron's cleanup-of-failure path).
#
# The result JSON is uploaded as `bake-metrics-<run_id>` with 90-day
# retention so trend analysis across the bake period is possible.
#
# See ADR-006 (Pending Mode default rollout) and ADR-005 D10 for the
# gate semantics. See scripts/check_bake_metrics.py docstring for the
# exact thresholds and predicate used here.

permissions:
  contents: read
  actions: read  # for `gh run download` from prior DailyIngestion runs

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'Anchor bake window start (YYYY-MM-DD). Default 2026-05-16 (ADR-006 PR-A merge).'
        required: false
        default: '2026-05-16'
        type: string
      runner:
        description: 'Runner type.'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - self-hosted

concurrency:
  group: bake-metrics-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 15
    environment: Production
    env:
      TZ: Asia/Singapore
      BAKE_SINCE: ${{ inputs.since || '2026-05-16' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python, venv, dependencies, Rust extension
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'

      # Fetch the latest successful DailyIngestion artifact. `gh run
      # list` is filtered to `--status=success` so we don't read a
      # partial bundle from a run that died after upload but before
      # commit-results (which would leave the DB in an inconsistent
      # post-rollback state). 7-day retention on the artifact gives us
      # headroom if Daily is paused via ADR-006's pause gate.
      - name: Download latest reports artifact from DailyIngestion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LATEST_RUN=$(gh run list \
            --workflow=DailyIngestion.yml \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$LATEST_RUN" ] || [ "$LATEST_RUN" = "null" ]; then
            echo "::error::No successful DailyIngestion run found in the artifact retention window (7 days). Either the pipeline is paused (check .publish-config.yml for pipeline_paused_until) or has been failing — investigate before trusting bake metrics."
            exit 1
          fi
          echo "Downloading reports artifact from DailyIngestion run #$LATEST_RUN"
          gh run download "$LATEST_RUN" \
            --name pipeline-reports-encrypted \
            --dir encrypted_artifacts

      - name: Decrypt reports
        env:
          ARTIFACT_KEY: ${{ secrets.ARTIFACT_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$ARTIFACT_KEY" ]; then
            echo "::error::ARTIFACT_KEY secret is not configured — cannot decrypt the reports artifact."
            exit 1
          fi
          if [ ! -f encrypted_artifacts/reports.tar.gz.enc ]; then
            echo "::error::Encrypted reports archive not found in the downloaded artifact."
            exit 1
          fi
          openssl enc -aes-256-cbc -d -pbkdf2 -iter 100000 \
            -in encrypted_artifacts/reports.tar.gz.enc \
            -pass pass:"$ARTIFACT_KEY" | tar -xzf -
          rm -rf encrypted_artifacts
          # Sanity check: the three files the script reads must be
          # present, else we'd silently emit a misleading "no data" pass.
          for f in reports/reports.db reports/history.db reports/D1/d1_drift.jsonl; do
            if [ ! -f "$f" ]; then
              echo "::warning::Expected file missing after decrypt: $f"
            fi
          done

      # Run twice: once with --json for the artifact, once as text for
      # the action log. The script is read-only and ~50ms so the cost
      # is negligible. `set +e` so a check failure (rc=1) doesn't abort
      # the step before we capture the JSON for the summary.
      - name: Run ADR-006 bake metrics check
        id: check
        run: |
          set +e
          python3 -m apps.cli.ops.check_bake_metrics \
            --since "$BAKE_SINCE" \
            --json > bake_result.json
          RC=$?
          set -e
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          echo "--- Human-readable output ---"
          python3 -m apps.cli.ops.check_bake_metrics --since "$BAKE_SINCE" || true

      - name: Emit step summary
        run: |
          {
            echo "# ADR-006 Bake Metrics Check"
            echo ""
            echo "**Anchor**: \`--since $BAKE_SINCE\`"
            echo ""
            if [ "${{ steps.check.outputs.rc }}" = "0" ]; then
              echo "**Result**: ✅ PASS — all three D10 checks within threshold."
            else
              echo "**Result**: ❌ FAIL — one or more checks regressed."
              echo ""
              echo "An operator must investigate before declaring the bake clean. See [\`docs/en/ops/d1-rollback.md\`](../blob/main/docs/en/ops/d1-rollback.md) Appendix A.1 for the ADR-005 D10 gate definition."
            fi
            echo ""
            echo "## Detail"
            echo ""
            echo '```json'
            cat bake_result.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload result for trend analysis
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bake-metrics-${{ github.run_id }}
          path: bake_result.json
          retention-days: 90
          if-no-files-found: error

      # Surface the failure as a workflow failure so the standard
      # Actions "run failed" notification fires. The step summary above
      # gives the human-readable detail; the artifact gives the JSON.
      - name: Fail workflow if check regressed
        if: steps.check.outputs.rc != '0'
        run: |
          echo "::error::ADR-006 bake gate FAILED. See the step summary and the bake-metrics-${{ github.run_id }} artifact."
          exit 1
