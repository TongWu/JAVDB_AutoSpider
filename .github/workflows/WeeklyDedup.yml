name: Weekly Dedup

concurrency:
  group: rclone-manager
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

on:
  # schedule: # DISABLED FOR PUBLIC REPO
    # Sunday 20:00 UTC (= Monday 04:00 UTC+8 / SGT).
    # DOW 0 = Sunday in cron, so this fires at 20:00 UTC on Sundays.
    # - cron: '0 20 * * 0'

  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner type for the job'
        required: false
        default: 'self-hosted'
        type: choice
        options:
          - 'ubuntu-latest'
          - 'self-hosted'
      root_path:
        description: 'Rclone root path (format: remote:/path)'
        required: false
        default: 'gdrive:/剧集/不可以色色/JAV-Sync'
        type: string
      dry_run:
        description: 'Dry run mode — simulate execute without deleting'
        required: false
        default: false
        type: boolean
      incremental:
        description: 'Incremental mode — only process recent changes in report'
        required: false
        default: false
        type: boolean
      years:
        description: 'Comma-separated list of years (empty = all)'
        required: false
        default: ''
        type: string
      workers:
        description: 'Number of parallel workers'
        required: false
        default: '4'
        type: string
      log_level:
        description: 'Logging level'
        required: false
        default: 'INFO'
        type: choice
        options:
          - 'DEBUG'
          - 'INFO'
          - 'WARNING'
          - 'ERROR'

jobs:
  weekly-dedup:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    environment: Production
    env:
      TZ: Asia/Singapore
      GH_TOKEN: ${{ github.token }}
      INPUT_RUNNER: ${{ inputs.runner || 'ubuntu-latest' }}
      INPUT_ROOT_PATH: ${{ inputs.root_path || 'gdrive:/剧集/不可以色色/JAV-Sync' }}
      INPUT_YEARS: ${{ inputs.years || '' }}
      INPUT_WORKERS: ${{ inputs.workers || '4' }}
      INPUT_LOG_LEVEL: ${{ inputs.log_level || 'INFO' }}
      INPUT_DRY_RUN: ${{ inputs.dry_run || 'false' }}
      INPUT_INCREMENTAL: ${{ inputs.incremental || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          lfs: true

      - name: Set up Python, venv, dependencies, Rust extension
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'

      - name: Generate config.py from GitHub Variables and Secrets
        env:
          # Rclone / Dedup Configuration
          VAR_RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
          VAR_RCLONE_FOLDER_PATH: ${{ vars.RCLONE_FOLDER_PATH }}
          VAR_STORAGE_MODE: ${{ vars.STORAGE_MODE }}
          # File paths / logging
          VAR_REPORTS_DIR: ${{ vars.REPORTS_DIR || 'reports' }}
          VAR_DEDUP_DIR: ${{ vars.DEDUP_DIR }}
          VAR_RCLONE_INVENTORY_CSV: ${{ vars.RCLONE_INVENTORY_CSV || 'rclone_inventory.csv' }}
          VAR_DEDUP_CSV: ${{ vars.DEDUP_CSV || 'dedup.csv' }}
          VAR_DEDUP_LOG_FILE: ${{ vars.DEDUP_LOG_FILE || 'logs/rclone_dedup.log' }}
          VAR_LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
        run: python3 -m apps.cli.config_generator --github-actions

      - name: Set report paths
        run: |
          REPORTS_DIR="${{ vars.REPORTS_DIR || 'reports' }}"
          DEDUP_DIR="${{ vars.DEDUP_DIR }}"
          if [ -z "$DEDUP_DIR" ]; then DEDUP_DIR="$REPORTS_DIR/Dedup"; fi
          RCLONE_INVENTORY_CSV="${{ vars.RCLONE_INVENTORY_CSV || 'rclone_inventory.csv' }}"
          DEDUP_CSV="${{ vars.DEDUP_CSV || 'dedup.csv' }}"
          echo "REPORTS_DIR=$REPORTS_DIR" >> "$GITHUB_ENV"
          echo "DEDUP_DIR=$DEDUP_DIR" >> "$GITHUB_ENV"
          echo "RCLONE_INVENTORY_CSV=$RCLONE_INVENTORY_CSV" >> "$GITHUB_ENV"
          echo "DEDUP_CSV=$DEDUP_CSV" >> "$GITHUB_ENV"

      - name: Install rclone
        if: inputs.runner != 'self-hosted'
        run: |
          bash .github/scripts/install_rclone.sh
          rclone version

      - name: Configure rclone
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          if [ -z "$RCLONE_CONFIG_BASE64" ]; then
            echo "❌ Error: RCLONE_CONFIG_BASE64 secret is not set"
            exit 1
          fi
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_BASE64" | base64 -d > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf
          echo "✓ rclone configured from Base64"
          rclone listremotes

      - name: Pull latest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"

          REPO_URL=$(git remote get-url origin)
          if [[ "$REPO_URL" == https://* ]]; then
            REPO_SSH=$(echo "$REPO_URL" | sed 's|https://github.com/|git@github.com:|')
            git remote set-url origin "$REPO_SSH"
          fi

          git fetch origin "$CURRENT_BRANCH"
          git pull --rebase origin "$CURRENT_BRANCH" || git pull --no-edit origin "$CURRENT_BRANCH" || true

      - name: Run scan + report + execute
        env:
          INPUT_ROOT_PATH: ${{ inputs.root_path || 'gdrive:/剧集/不可以色色/JAV-Sync' }}
          INPUT_YEARS: ${{ inputs.years || '' }}
          INPUT_WORKERS: ${{ inputs.workers || '4' }}
          INPUT_LOG_LEVEL: ${{ inputs.log_level || 'INFO' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          INPUT_INCREMENTAL: ${{ inputs.incremental || 'false' }}
          VAR_STORAGE_MODE: ${{ vars.STORAGE_MODE }}
        run: |
          set -e
          set -o pipefail

          CMD=(python3 -m apps.cli.rclone_manager --scan --report --execute)

          if [ -n "$INPUT_ROOT_PATH" ]; then
            CMD+=(--root-path "$INPUT_ROOT_PATH")
          fi

          if [ -n "$INPUT_YEARS" ]; then
            CMD+=(--years "$INPUT_YEARS")
            echo "📆 Year filter: $INPUT_YEARS"
          fi

          CMD+=(--workers "$INPUT_WORKERS" --log-level "$INPUT_LOG_LEVEL")

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            CMD+=(--dry-run)
            echo "🔍 Execute in DRY-RUN mode"
          fi

          if [ "$INPUT_INCREMENTAL" = "true" ]; then
            CMD+=(--incremental)
            echo "📅 Incremental mode enabled"
          fi

          echo "Running: ${CMD[*]}"
          "${CMD[@]}"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"

          REPO_URL=$(git remote get-url origin)
          if [[ "$REPO_URL" == https://* ]]; then
            REPO_SSH=$(echo "$REPO_URL" | sed 's|https://github.com/|git@github.com:|')
            git remote set-url origin "$REPO_SSH"
          fi

          git add "$REPORTS_DIR/$RCLONE_INVENTORY_CSV" 2>/dev/null || true
          git add "$REPORTS_DIR/operations.db" 2>/dev/null || true
          git add "$REPORTS_DIR/dedup_history.csv" 2>/dev/null || true
          find "$DEDUP_DIR" -name "*.csv" -exec git add {} \; 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          DRY_RUN="$INPUT_DRY_RUN"
          LABEL="scan+report+execute"
          if [ "$DRY_RUN" = "true" ]; then
            LABEL="scan+report+execute(dry-run)"
          fi

          git commit -m "Auto-commit: weekly dedup ${LABEL} $(date +'%Y-%m-%d %H:%M:%S SGT')"
          LOCAL_COMMIT=$(git rev-parse HEAD)

          MAX_RETRIES=3
          RETRY_DELAY=3
          for i in $(seq 1 $MAX_RETRIES); do
            git fetch origin "$CURRENT_BRANCH"
            git pull --rebase origin "$CURRENT_BRANCH" || true
            if git push origin "$CURRENT_BRANCH"; then
              echo "✓ Results committed and pushed"
              exit 0
            fi
            sleep $RETRY_DELAY
            RETRY_DELAY=$((RETRY_DELAY * 2))
          done

          echo ""
          echo "::warning::Failed to push after $MAX_RETRIES attempts. Initiating fallback branch strategy..."

          git checkout "$CURRENT_BRANCH" 2>/dev/null || true
          git reset --hard "$LOCAL_COMMIT" 2>/dev/null || true

          bash .github/scripts/fallback_push.sh "weekly-dedup" "$CURRENT_BRANCH" "$LOCAL_COMMIT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: weekly-dedup-${{ github.run_number }}
          path: |
            ${{ env.REPORTS_DIR }}/${{ env.RCLONE_INVENTORY_CSV }}
            ${{ env.REPORTS_DIR }}/operations.db
            ${{ env.REPORTS_DIR }}/dedup_history.csv
            ${{ env.DEDUP_DIR }}/
          retention-days: 30
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          summary_bool() {
            if [ "$1" = "true" ]; then
              printf 'Yes'
            else
              printf 'No'
            fi
          }
          echo "## Weekly Dedup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Phases**: scan → report → execute" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Dry Run**: %s\n' "$(summary_bool "$INPUT_DRY_RUN")" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Incremental**: %s\n' "$(summary_bool "$INPUT_INCREMENTAL")" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Root Path**: %s\n' "$INPUT_ROOT_PATH" >> $GITHUB_STEP_SUMMARY

          YEARS="$INPUT_YEARS"
          if [ -n "$YEARS" ]; then
            echo "- **Year Filter**: $YEARS" >> $GITHUB_STEP_SUMMARY
          fi

          printf -- '- **Workers**: %s\n' "$INPUT_WORKERS" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Log Level**: %s\n' "$INPUT_LOG_LEVEL" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Runner**: %s\n' "$INPUT_RUNNER" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$REPORTS_DIR/$RCLONE_INVENTORY_CSV" ]; then
            LINES=$(wc -l < "$REPORTS_DIR/$RCLONE_INVENTORY_CSV")
            echo "### Inventory" >> $GITHUB_STEP_SUMMARY
            echo "Records: $((LINES - 1))" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -d "$DEDUP_DIR" ]; then
            REPORT_FILE=$(find "$DEDUP_DIR" -name "*.csv" -type f | sort -r | head -1)
            if [ -n "$REPORT_FILE" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Dedup Report" >> $GITHUB_STEP_SUMMARY
              echo "Report file: \`$REPORT_FILE\`" >> $GITHUB_STEP_SUMMARY
              LINES=$(wc -l < "$REPORT_FILE")
              echo "Records: $((LINES - 1))" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  # After the weekly dedup finishes, run Migration.yml's align_inventory_history
  # task with default settings. Capped at 10 hours (600 minutes).
  align-inventory-history:
    needs: weekly-dedup
    uses: ./.github/workflows/Migration.yml
    secrets: inherit
    with:
      align_inventory_history: true
      runner: ${{ inputs.runner || 'self-hosted' }}
      timeout_minutes: 600
