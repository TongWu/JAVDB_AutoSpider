name: 'Install Rust Wheel'
description: 'Build or restore cached javdb_rust_core wheel and install it into the current Python environment'

outputs:
  cache-hit:
    description: 'Whether the wheel was restored from cache'
    value: ${{ steps.wheel-cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Detect pip command
      id: pip
      shell: bash
      run: |
        python_from_pip() {
          local pip_bin="$1"
          local ver
          ver=$("$pip_bin" -V 2>&1 | sed -n 's/.*([Pp]ython \([0-9.]*\)).*/\1/p')
          if [[ -n "$ver" ]] && command -v "python${ver}" &>/dev/null; then
            echo "python${ver}"
          else
            echo "python3"
          fi
        }
        if command -v pip &>/dev/null; then
          echo "cmd=pip" >> $GITHUB_OUTPUT
          echo "python_cmd=$(python_from_pip pip)" >> $GITHUB_OUTPUT
        elif command -v pip3 &>/dev/null; then
          echo "cmd=pip3" >> $GITHUB_OUTPUT
          echo "python_cmd=$(python_from_pip pip3)" >> $GITHUB_OUTPUT
        else
          echo "cmd=python3 -m pip" >> $GITHUB_OUTPUT
          echo "python_cmd=python3" >> $GITHUB_OUTPUT
        fi

    - name: Restore Rust wheel from cache
      id: wheel-cache
      uses: actions/cache@v5
      with:
        path: /tmp/rust-wheel
        key: rust-wheel-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packages/rust/javdb_rust_core/src/**', 'packages/rust/javdb_rust_core/Cargo.toml', 'packages/rust/javdb_rust_core/Cargo.lock') }}

    - name: Install from cached wheel
      if: steps.wheel-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        ${{ steps.pip.outputs.cmd }} install /tmp/rust-wheel/*.whl
        echo "✓ Installed Rust extension from cache"

    - name: Install Rust toolchain
      if: steps.wheel-cache.outputs.cache-hit != 'true'
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo dependencies
      if: steps.wheel-cache.outputs.cache-hit != 'true'
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          packages/rust/javdb_rust_core/target
        key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('packages/rust/javdb_rust_core/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-cargo-

    - name: Build Rust extension wheel
      if: steps.wheel-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        ${{ steps.pip.outputs.cmd }} install maturin[patchelf]
        mkdir -p /tmp/rust-wheel
        cd packages/rust/javdb_rust_core
        # User installs (common on self-hosted) put scripts in ~/.local/bin, which is often not on PATH.
        export PATH="${HOME}/.local/bin:${PATH}"
        ${{ steps.pip.outputs.python_cmd }} -m maturin build --release --out /tmp/rust-wheel
        echo "✓ Built Rust extension wheel:"
        ls -lh /tmp/rust-wheel/*.whl

    - name: Install built wheel
      if: steps.wheel-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        ${{ steps.pip.outputs.cmd }} install /tmp/rust-wheel/*.whl
        echo "✓ Installed Rust extension from freshly built wheel"
