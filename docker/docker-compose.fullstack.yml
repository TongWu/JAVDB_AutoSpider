version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: javdb-api
    working_dir: /app
    command: ["python3", "-m", "uvicorn", "apps.api.server:app", "--host", "0.0.0.0", "--port", "8100"]
    ports:
      - "8100:8100"
    environment:
      - TZ=Asia/Shanghai
      - API_SECRET_KEY=${API_SECRET_KEY:?API_SECRET_KEY is required}
      - SECRETS_ENCRYPTION_KEY=${SECRETS_ENCRYPTION_KEY:?SECRETS_ENCRYPTION_KEY is required}
      - ADMIN_USERNAME=${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
    volumes:
      - ../reports:/app/reports
      - ../logs:/app/logs
      - ../.env:/app/.env

  web:
    # The published image's nginx proxies /api to the api service on its
    # internal network, so the browser only ever talks to localhost:8088
    # (same-origin) — no VITE_API_BASE override or CORS_ORIGINS expansion
    # needed. Setting VITE_API_BASE=http://api:8100 would 404 in-browser
    # because Docker's internal DNS isn't reachable from the host.
    image: ghcr.io/tedwu/javdb-autospider-web:latest
    container_name: javdb-web
    ports:
      - "8088:80"
    depends_on:
      - api
